<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Deep Research Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --bg2: #12151e;
  --bg3: #1a1e2e;
  --surface: #222738;
  --border: #2d3348;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #e94560;
  --radius: 10px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Animated background gradient */
body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(233, 69, 96, 0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 50%, rgba(129, 140, 248, 0.04) 0%, transparent 50%);
  animation: bgShift 15s ease-in-out infinite;
  z-index: 0;
}

@keyframes bgShift {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -1%) rotate(1deg); }
  66% { transform: translate(-1%, 2%) rotate(-1deg); }
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5),
              0 0 0 1px rgba(233, 69, 96, 0.05);
}

.login-header {
  text-align: center;
  margin-bottom: 36px;
}

.login-icon {
  font-size: 36px;
  margin-bottom: 16px;
  display: block;
}

.login-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent), #ff6b8a);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.login-header p {
  font-size: 13px;
  color: var(--text3);
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
  margin-bottom: 8px;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
}

.form-group input::placeholder {
  color: var(--text3);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.login-btn:hover {
  background: #d63d56;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn:disabled {
  opacity: 0.5;
  pointer-events: none;
}

.login-btn .spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  text-align: center;
  color: var(--accent);
  font-size: 13px;
  font-weight: 500;
  margin-top: 16px;
  min-height: 20px;
  opacity: 0;
  transition: opacity 0.3s;
}

.error-msg.visible {
  opacity: 1;
}

.footer-text {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  letter-spacing: 0.02em;
}

.footer-text span {
  color: var(--accent);
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <span class="login-icon">🔬</span>
      <h1>Deep Research Workflow</h1>
      <p>Sign in to access your research workspace</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="footer-text">
    <span>●</span> Secured access · Multi-model orchestrator
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  
  const btn = document.getElementById("loginBtn");
  const errorEl = document.getElementById("errorMsg");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  // Reset error
  errorEl.classList.remove("visible");
  errorEl.textContent = "";

  // Loading state
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (data.success) {
      // Redirect to app
      window.location.href = "/";
    } else {
      errorEl.textContent = data.error || "Invalid credentials";
      errorEl.classList.add("visible");
      btn.disabled = false;
      btn.innerHTML = "Sign In";
    }
  } catch (err) {
    errorEl.textContent = "Connection error — is the server running?";
    errorEl.classList.add("visible");
    btn.disabled = false;
    btn.innerHTML = "Sign In";
  }
}
</script>

</body>
</html>
